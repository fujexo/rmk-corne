[keyboard]
name = "Corne v4_1"
product_name = "cornev41"
vendor_id = 0x4653
product_id =0x0004
manufacturer = "RMK"
chip = "rp2040"
serial_number = "vial:f64c2b3c:000001"

[layout]
rows = 8
cols = 7
layers = 4
matrix_map = """
(0, 0, L) (0, 1, L) (0, 2, L) (0, 3, L) (0, 4, L) (0, 5, L) (0, 6, R)
(1, 0, L) (1, 1, L) (1, 2, L) (1, 3, L) (1, 4, L) (1, 5, L) (1, 6, L)
(2, 0, L) (2, 1, L) (2, 2, L) (2, 3, L) (2, 4, L) (2, 5, L)
                              (3, 3, L) (3, 4, L) (3, 5, L)
(4, 6, R) (4, 5, R) (4, 4, R) (4, 3, R) (4, 2, R) (4, 1, R) (4, 0, R)
(5, 6, R) (5, 5, R) (5, 4, R) (5, 3, R) (5, 2, R) (5, 1, R) (5, 0, R)
          (6, 5, R) (6, 4, R) (6, 3, R) (6, 2, R) (6, 1, R) (6, 0, R)
          (7, 5, R) (7, 4, R) (7, 3, R)
"""

# layer 0 (default):
[[layer]]
name = "base_layer"
keys = """
Escape Q     W     E           R            T         No
Tab    A     S     D           F            G         No
LShift Z     X     C           V            B
                   LGui        MO(1)        Space
No     Y     U     I           O            P         Backspace
No     H     J     K           L            ;         Quote
       N     M     comma       dot          /         Delete
       Enter MO(2) RGui
"""

# layer 1 (numerical):
[[layer]]
name = "numerical_layer"
keys = """
Escape Kc1   Kc2   Kc3         Kc4          Kc5       trns
Tab    trns  trns  trns        trns         trns      trns
LShift trns  trns  trns        trns         trns
                   LGui        trns         Space

No     Kc6   Kc7   Kc8         Kc9          Kc0       Backspace
No     Left  Down  Up          Right        trns      trns
       trns  trns  trns        trns         trns      Delete
       Enter trns  RGui
"""

# layer 2 (punctuation):
[[layer]]
name = "punctuation_layer"
keys = """
Escape trns  trns  trns        trns         trns      trns
Tab    trns  trns  trns        trns         trns      trns
LShift trns  trns  trns        trns         trns
                   LGui        trns         Space

No     trns  trns  trns        trns         trns      Backspace
No     Minus Equal LeftBracket RightBracket Backslash Grave
       trns  trns  trns        trns         trns      Delete
       Enter trns  RGui
"""

# layer 3 (speical):
[[layer]]
name = "special_layer"
keys = """
Escape trns  trns  trns        trns         trns      trns
Tab    trns  trns  trns        trns         trns      trns
LShift trns  trns  trns        trns         trns
                   LGui        trns         Space

No     trns  trns  trns        trns         trns      Backspace
No     trns  trns  trns        trns         trns      trns
       trns  trns  trns        trns         trns      Delete
       Enter trns  RGui
"""

[behavior.tri_layer]
upper = 1
lower = 2
adjust = 3

[storage]
clear_storage = true

[light]

[split]
connection = "serial"

[split.central]
rows = 4
cols = 7
row_offset = 0
col_offset = 0
serial = [{ instance = "PIO0", tx_pin = "PIN_12", rx_pin = "PIN_12" }]
[split.central.matrix]
matrix_type = "direct_pin"
direct_pins = [
    ["PIN_22", "PIN_20", "PIN_23", "PIN_26", "PIN_29", "PIN_0",  "PIN_4"],
    ["PIN_19", "PIN_18", "PIN_24", "PIN_27", "PIN_1",  "PIN_2",  "PIN_8"],
    ["PIN_17", "PIN_16", "PIN_25", "PIN_28", "PIN_3",  "PIN_9",  "trns"],
    ["trns",   "trns",   "trns",   "PIN_14", "PIN_15", "PIN_11", "trns"]
]

[[split.peripheral]]
rows = 4
cols = 7
row_offset = 4
col_offset = 0
serial = [{ instance = "PIO0", tx_pin = "PIN_12", rx_pin = "PIN_12" }]
[split.peripheral.matrix]
matrix_type = "direct_pin"
direct_pins = [
    ["PIN_8",  "PIN_9",  "PIN_3",  "PIN_2",  "PIN_1",  "PIN_27", "PIN_25"],
    ["PIN_11", "PIN_14", "PIN_4",  "PIN_0",  "PIN_28", "PIN_26", "PIN_23"],
    ["PIN_15", "PIN_18", "PIN_5",  "PIN_29", "PIN_20", "PIN_22", "trns"],
     ["trns", "trns", "trns", "PIN_16", "PIN_17", "PIN_19", "trns"]
]

[rmk]
split_peripherals_num = 1
